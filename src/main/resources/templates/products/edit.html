<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>상품 수정 - HanSung</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background: linear-gradient(90deg, #1a1a2e, #0f3460); }
        .navbar-brand { font-weight: 800; color: #e94560 !important; font-size: 1.4rem; }
        .card { border: none; border-radius: 12px; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">HanSung</a>
    </div>
</nav>

<div class="container" style="max-width: 600px;">
    <div class="card shadow-sm mt-4">
        <div class="card-header bg-white pt-4 border-0">
            <h4 class="fw-bold text-center text-dark">상품 정보 수정</h4>
        </div>
        <div class="card-body px-4 pb-4">
            <form th:action="@{/products/{id}/edit(id=${productId})}" th:object="${product}" method="post">

                <div class="mb-3">
                    <label for="name" class="form-label fw-semibold">상품명</label>
                    <input type="text" th:field="*{name}" class="form-control" required/>
                </div>

                <div class="mb-3">
                    <label for="price" class="form-label fw-semibold">가격 (원)</label>
                    <input type="number" th:field="*{price}" class="form-control" required/>
                </div>

                <div class="mb-3">
                    <label for="stock" class="form-label fw-semibold">재고 수량</label>
                    <input type="number" th:field="*{stock}" class="form-control" required/>
                </div>

                <div class="mb-3">
                    <label for="description" class="form-label fw-semibold">상품 설명</label>
                    <textarea th:field="*{description}" class="form-control" rows="3"></textarea>
                </div>

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-primary w-100 fw-semibold">수정 완료</button>
                    <a th:href="@{/products}" class="btn btn-outline-secondary w-100 fw-semibold">취소</a>
                </div>
            </form>
        </div>
    </div>
</div>

<div class="container text-center mt-5 mb-4">
    <hr>
    <p class="text-muted" style="font-size: 0.95rem; letter-spacing: -0.5px;">
        학번: <strong>2191036</strong> │
        성명: <strong>최세익</strong> │
        실습 수행: <span class="fw-semibold text-dark" th:text="${'실습 수행: ' + #temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss')}">2026-05-30 00:00:00</span>
    </p>
</div>

</body>
</html>
